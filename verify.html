<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verify Receipt — SMT Receipt System</title>

<link rel="stylesheet" href="style.css" />

<style>
.verify-hero {
  background: #111827;
  color: #f9fafb;
  padding: 1.5rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
}

.result-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
  margin-top: 1rem;
}

@media (max-width: 600px) {
  .result-detail-grid {
    grid-template-columns: 1fr;
  }
}

.detail-item {
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 8px;
  padding: 0.8rem;
}

.detail-label {
  font-size: 0.7rem;
  color: #9ca3af;
  margin-bottom: 0.3rem;
}

.detail-value {
  color: #fff;
  font-weight: 600;
}

.amount-display {
  font-size: 1.8rem;
  font-weight: 700;
  color: #22c55e;
}

.result-valid {
  background: #052e16;
  border: 1px solid #22c55e;
  border-radius: 8px;
  padding: 1rem;
  margin-top: 1.5rem;
}

.result-invalid {
  background: #2b0b0b;
  border: 1px solid #ef4444;
  border-radius: 8px;
  padding: 1rem;
  margin-top: 1.5rem;
}

#loadingState {
  text-align: center;
  padding: 2rem;
  display: none;
}

.big-spinner {
  width: 30px;
  height: 30px;
  border: 3px solid #374151;
  border-top-color: #22c55e;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>
<body>

<header class="site-header">
  <div class="brand"><span>SMT</span> Receipt System</div>
  <nav>
    <a href="index.html">Admin</a>
    <a href="members.html">Members</a>
    <a href="verify.html" class="active">Verify</a>
  </nav>
</header>

<div class="page-wrap">

  <div class="verify-hero">
    <h2>Verify Receipt</h2>
    <p>Enter receipt ID to check authenticity</p>
  </div>

  <div class="card">
    <label style="font-size:0.8rem; margin-bottom:0.4rem; display:block;">Receipt ID</label>
    <div class="verify-input-wrap">
      <input type="text" id="receiptIdInput" placeholder="SMT-XXXX"
        oninput="this.value = this.value.toUpperCase()" />
      <button class="btn btn-primary" id="verifyBtn" onclick="verify()">Verify →</button>
    </div>
  </div>

  <div id="loadingState">
    <div class="big-spinner"></div>
    <p style="color:#9ca3af;">Checking...</p>
  </div>

  <div id="resultArea"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// 🔐 Your API (hidden from UI)
const apiUrl = "https://script.google.com/macros/s/AKfycbzE-8i_YkXDbDqFGXZ3YG_5kcr_qAR5vTTjF7IEumaDEO79M4aGY5BGfRFwC6Ylpn8B/exec";

// Auto-fill from QR link
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('receiptIdInput').value = id.toUpperCase();
    verify();
  }
});

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') verify();
});

// Verify function
async function verify() {
  const id = document.getElementById('receiptIdInput').value.trim().toUpperCase();
  if (!id) return showToast('Enter Receipt ID');

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.innerHTML = '...';

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('resultArea').innerHTML = '';

  try {
    const res = await fetch(`${apiUrl}?action=verify&id=${encodeURIComponent(id)}`);
    const json = await res.json();

    btn.disabled = false;
    btn.innerHTML = 'Verify →';
    document.getElementById('loadingState').style.display = 'none';

    if (json.status === 'VALID') {
      showValid(json.data);
    } else {
      showInvalid(id);
    }

  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = 'Verify →';
    document.getElementById('loadingState').style.display = 'none';
    showToast('Connection error');
  }
}

// Show valid
function showValid(d) {
  const amt = Number(d.Amount).toLocaleString();

  document.getElementById('resultArea').innerHTML = `
    <div class="result-valid">
      <h3>✅ Valid Receipt</h3>

      <div class="result-detail-grid">
        <div class="detail-item">
          <div class="detail-label">Amount</div>
          <div class="amount-display">৳ ${amt}</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">Name</div>
          <div class="detail-value">${d.MemberName}</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">Phone</div>
          <div class="detail-value">${d.Phone}</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">Purpose</div>
          <div class="detail-value">${d.Purpose}</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">Date</div>
          <div class="detail-value">${d.Date}</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">Time</div>
          <div class="detail-value">${d.Time}</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">Receipt ID</div>
          <div class="detail-value">${d.ReceiptID}</div>
        </div>
      </div>
    </div>
  `;
}

// Show invalid
function showInvalid(id) {
  document.getElementById('resultArea').innerHTML = `
    <div class="result-invalid">
      <h3>❌ Invalid Receipt</h3>
      <p>Receipt "${id}" not found</p>
    </div>
  `;
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

</body>
</html>
