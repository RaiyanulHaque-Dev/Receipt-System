<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel — SMT Receipt System</title>
<link rel="stylesheet" href="style.css" />
<style>
  .setup-notice {
    background: #fff3cd;
    border: 1.5px solid #ffc107;
    border-radius: 4px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #664d00;
  }
  .setup-notice strong { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }
  .setup-notice code {
    background: rgba(0,0,0,0.08);
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
  }
  .config-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .config-row input {
    flex: 1;
    border: 1.5px solid #ffc107;
    border-radius: 3px;
    padding: 0.6rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    background: #fffdf0;
  }
  .config-row input:focus { outline: none; border-color: var(--accent); }
  #txnIdGroup { display: none; }
</style>
</head>
<body>

<header class="site-header">
  <div class="brand"><span>SMT</span> Receipt System</div>
  <nav>
    <a href="index.html" class="active">Admin</a>
    <a href="members.html">Members</a>
    <a href="verify.html">Verify</a>
  </nav>
</header>

<div class="page-wrap">
  <h1 class="page-title">Generate Receipt</h1>
  <p class="page-sub">// admin panel — authorized personnel only</p>

  <!-- ── Setup Notice ── -->
  <div class="setup-notice">
    <strong>⚙️ First-time Setup Required</strong>
    Paste your Google Apps Script Web App URL below before generating receipts.
    Deploy your Apps Script as a <code>Web App</code> with access set to <em>Anyone</em>.
  </div>

  <div class="config-row">
    <input type="url" id="apiUrl" placeholder="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" />
    <button class="btn btn-outline" onclick="saveApiUrl()">Save URL</button>
  </div>

  <!-- ── Form ── -->
  <div class="card">
    <form id="receiptForm">
      <div class="form-grid">

        <div class="form-group full">
          <label>Select Member *</label>
          <input type="text" id="memberSearch" list="memberList" placeholder="Type name, ID or phone to search..."
            autocomplete="off" required oninput="handleMemberInput()" />
          <datalist id="memberList"></datalist>
          <input type="hidden" id="memberId" />
        </div>

        <div class="form-group">
          <label>Member Name *</label>
          <input type="text" id="memberName" placeholder="Auto-filled from selection" readonly required />
        </div>

        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="phone" placeholder="Auto-filled from selection" readonly required />
        </div>

        <div class="form-group">
          <label>Amount (BDT) *</label>
          <input type="number" id="amount" placeholder="0.00" min="1" required />
        </div>

        <div class="form-group">
          <label>Payment Method *</label>
          <select id="paymentMethod" onchange="handlePaymentChange()" required>
            <option value="">— Select —</option>
            <option value="Cash">Cash</option>
            <option value="bKash">bKash</option>
            <option value="Nagad">Nagad</option>
            <option value="Bank Transfer">Bank Transfer</option>
          </select>
        </div>

        <div class="form-group" id="txnIdGroup">
          <label>Transaction ID *</label>
          <input type="text" id="transactionId" placeholder="TXN reference number" />
        </div>

        <div class="form-group">
          <label>Purpose *</label>
          <select id="purpose" required>
            <option value="">— Select —</option>
            <option value="Monthly Deposit">Monthly Deposit</option>
            <option value="Fine">Fine</option>
            <option value="Registration Fee">Registration Fee</option>
            <option value="Event Fee">Event Fee</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div class="form-group">
          <label>Admin / Created By *</label>
          <input type="text" id="createdBy" placeholder="Your name" required />
        </div>

        <div class="form-group">
          <label>Admin Notes (optional)</label>
          <input type="text" id="notes" placeholder="Any remarks..." />
        </div>

      </div>

      <div class="divider">generate</div>

      <div style="display:flex; justify-content:flex-end;">
        <button type="submit" class="btn btn-primary" id="submitBtn">
          Generate Receipt →
        </button>
      </div>
    </form>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'smt_api_url';
let membersCache = [];

// ── Load saved API URL
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) document.getElementById('apiUrl').value = saved;
  loadMembersForDropdown();
});

// ── Load members into the searchable dropdown (lazy, only what's needed)
async function loadMembersForDropdown() {
  const apiUrl = localStorage.getItem(STORAGE_KEY);
  if (!apiUrl) return; // nothing to load until API URL is set

  try {
    const res = await fetch(`${apiUrl}?action=listMembers`);
    const json = await res.json();
    membersCache = (json && json.data) ? json.data : [];

    const list = document.getElementById('memberList');
    list.innerHTML = membersCache
      .map(m => `<option value="${m.MemberID} - ${m.MemberName} - ${m.Phone}">`)
      .join('');
  } catch (err) {
    console.error('Could not load members for dropdown:', err);
  }
}

// ── Match typed/selected value against a cached member and auto-fill
function handleMemberInput() {
  const typed = document.getElementById('memberSearch').value;
  const match = membersCache.find(m => `${m.MemberID} - ${m.MemberName} - ${m.Phone}` === typed);

  if (match) {
    document.getElementById('memberId').value = match.MemberID;
    document.getElementById('memberName').value = match.MemberName;
    document.getElementById('phone').value = match.Phone;
  } else {
    document.getElementById('memberId').value = '';
    document.getElementById('memberName').value = '';
    document.getElementById('phone').value = '';
  }
}

function saveApiUrl() {
  const url = document.getElementById('apiUrl').value.trim();
  if (!url) return showToast('Please enter a valid URL');
  localStorage.setItem(STORAGE_KEY, url);
  showToast('API URL saved ✓');
  loadMembersForDropdown();
}

// ── Toggle Transaction ID field
function handlePaymentChange() {
  const method = document.getElementById('paymentMethod').value;
  const grp = document.getElementById('txnIdGroup');
  const txn = document.getElementById('transactionId');
  if (['bKash','Nagad','Bank Transfer'].includes(method)) {
    grp.style.display = 'flex';
    txn.required = true;
  } else {
    grp.style.display = 'none';
    txn.required = false;
    txn.value = '';
  }
}

// ── Generate unique receipt ID
function generateReceiptId() {
  const year = new Date().getFullYear();
  const seq = String(Math.floor(Math.random() * 9000) + 1000);
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const rand = Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  return `SMT-${year}-${seq}-${rand}`;
}

// ── Format date/time
function getNow() {
  const now = new Date();
  const date = now.toLocaleDateString('en-BD', {year:'numeric', month:'long', day:'numeric'});
  const time = now.toLocaleTimeString('en-BD', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  return { date, time, iso: now.toISOString() };
}

// ── Form submit
document.getElementById('receiptForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const apiUrl = localStorage.getItem(STORAGE_KEY) || document.getElementById('apiUrl').value.trim();
  if (!apiUrl) {
    showToast('⚠ Please save your API URL first');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';

  const { date, time, iso } = getNow();
  const receiptId = generateReceiptId();

  const data = {
    receiptId,
    memberId: document.getElementById('memberId').value.trim(),
    memberName: document.getElementById('memberName').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    amount: document.getElementById('amount').value,
    paymentMethod: document.getElementById('paymentMethod').value,
    transactionId: document.getElementById('transactionId').value.trim() || 'N/A',
    purpose: document.getElementById('purpose').value,
    date,
    time,
    iso,
    status: 'VERIFIED',
    createdBy: document.getElementById('createdBy').value.trim(),
    notes: document.getElementById('notes').value.trim(),
  };

  try {
    const res = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'create', ...data }),
      mode: 'no-cors' // Apps Script requires this
    });

    // With no-cors we can't read the response, so trust the request went through
    // Store the receipt data locally to pass to receipt.html
    sessionStorage.setItem('smt_receipt', JSON.stringify(data));
    window.location.href = 'receipt.html';

  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = 'Generate Receipt →';
    showToast('❌ Failed to save. Check your API URL.');
    console.error(err);
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>

</body>
</html>
